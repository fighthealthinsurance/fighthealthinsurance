apiVersion: ray.io/v1
kind: RayCluster
metadata:
  generation: 2
  labels:
    app.kubernetes.io/instance: raycluster
  name: raycluster-kuberay
  namespace: totallylegitco
spec:
  headGroupSpec:
    rayStartParams:
      dashboard-host: 0.0.0.0
    serviceType: ClusterIP
    template:
      metadata:
        annotations: {}
        labels:
      spec:
        affinity: {}
        containers:
          - image: ${RAY_BASE}:${FHI_VERSION}
            env:
              - name: RAY_gcs_server_request_timeout_seconds
                value: "20"
              # DB host sourced from fhi-db-config ConfigMap (see k8s/db-config.yaml).
              # Explicit env overrides any PDBHOST from the envFrom Secret, keeping the
              # ConfigMap the single switch point for the pg8->pg9 cutover.
              - name: PDBHOST
                valueFrom:
                  configMapKeyRef:
                    name: fhi-db-config
                    key: PDBHOST
            envFrom:
              - secretRef:
                  name: fight-health-insurance-secret
            imagePullPolicy: IfNotPresent
            name: ray-head
            resources:
              limits:
                cpu: "1"
                memory: 6G
              requests:
                cpu: "1"
                memory: 6G
            volumeMounts:
              - mountPath: /tmp/ray
                name: log-volume
              - name: faxymcfaxface-ssh
                readOnly: true
                # container will see /root/.ssh/id_rsa as usual:
                mountPath: "/home/ray/.ssh"
        volumes:
        - emptyDir: {}
          name: log-volume
        - name: faxymcfaxface-ssh
          secret:
            secretName: faxymcfaxface-ssh
            defaultMode: 0755
  workerGroupSpecs:
  - groupName: workergroup
    maxReplicas: 4
    minReplicas: 2
    rayStartParams: {}
    replicas: 1
    template:
      metadata:
        annotations: {}
        labels:
          app.kubernetes.io/instance: raycluster
      spec:
        containers:
          - image: ${RAY_BASE}:${FHI_VERSION}
            env:
              - name: RAY_gcs_server_request_timeout_seconds
                value: "30"
              # DB host sourced from fhi-db-config ConfigMap (see k8s/db-config.yaml).
              - name: PDBHOST
                valueFrom:
                  configMapKeyRef:
                    name: fhi-db-config
                    key: PDBHOST
            envFrom:
              - secretRef:
                  name: fight-health-insurance-secret
            imagePullPolicy: IfNotPresent
            name: ray-worker
            resources:
              limits:
                cpu: "1"
                memory: 7G
              requests:
                cpu: "1"
                memory: 6G
            volumeMounts:
            - mountPath: /tmp/ray
              name: log-volume
            - name: faxymcfaxface-ssh
              readOnly: true
              # container will see /root/.ssh/id_rsa as usual:
              mountPath: "/home/ray/.ssh"
        volumes:
        - emptyDir: {}
          name: log-volume
        - name: faxymcfaxface-ssh
          secret:
            secretName: faxymcfaxface-ssh
            defaultMode: 0755
