# Let's Encrypt production ClusterIssuer used by all ingresses
# (cert-manager.io/cluster-issuer: letsencrypt annotations).
#
# Cluster-scoped, applied out-of-band of build.sh:
#   kubectl apply -f k8s/cluster-issuer.yaml
#
# If the live issuer was originally registered with a different email or
# privateKeySecretRef, keep those values (check with
# `kubectl get clusterissuer letsencrypt -o yaml`). If the key ref changes,
# cert-manager just registers a fresh ACME account, which is harmless.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: holden@pigscanfly.ca
    privateKeySecretRef:
      name: letsencrypt
    solvers:
      # Use ingressClassName (not the deprecated `class`) so the generated
      # cm-acme-http-solver Ingress carries spec.ingressClassName=nginx and
      # gets picked up even by ingress-nginx versions that ignore the legacy
      # kubernetes.io/ingress.class annotation. Requires cert-manager >= 1.12.
      - http01:
          ingress:
            ingressClassName: nginx
