apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  namespace: totallylegitco
  labels:
    app: fight-health-insurance-prod
    group: fight-health-insurance-prod-temporal-worker
spec:
  # Faxes are low volume; start with one worker and scale out by raising
  # replicas (Temporal load-balances tasks across all workers on the queue).
  replicas: 1
  selector:
    matchLabels:
      group: fight-health-insurance-prod-temporal-worker
  template:
    metadata:
      labels:
        app: fight-health-insurance-prod
        group: fight-health-insurance-prod-temporal-worker
    spec:
      containers:
        - image: ${FHI_BASE}:${FHI_VERSION}
          name: totallylegitco
          # start-server.sh runs `manage.py run_temporal_worker` when this is set.
          env:
            - name: TEMPORAL_WORKER
              value: "1"
            - name: TEMPORAL_ENABLED
              value: "true"
            # In-cluster Temporal frontend (Helm release "temporal" in this ns).
            - name: TEMPORAL_HOST
              value: "temporal-frontend:7233"
            - name: TEMPORAL_NAMESPACE
              value: "default"
            - name: TEMPORAL_TASK_QUEUE
              value: "fhi-fax"
          envFrom:
            # Same DB / app secrets the web + Ray pods use, so activities can
            # reach the database and regenerate fax documents.
            - secretRef:
                name: fight-health-insurance-secret
            - secretRef:
                name: fight-health-insurance-primary-secret
          imagePullPolicy: Always
          # Partial hardening: no privilege escalation, all capabilities
          # dropped. runAsNonRoot / readOnlyRootFilesystem are deferred -- the
          # image entrypoint (start-server.sh) currently runs as root and the
          # worker writes temp fax documents, matching the other manifests.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            # Fax documents live on COMBINED_STORAGE -> /external_data. Mount
            # the shared uploads PVC (k8s/uploads-pvc.yaml) so activities can
            # read the stored PDF instead of falling back to regeneration.
            # NOTE: the live web Deployment (k8s/deploy.yaml) does not mount
            # this claim, and the Ray back cluster mounts a *different* claim
            # (backup3) at this path -- see the pre-flight checklist in
            # README.md.
            - name: new-uploads-longhorn-backup4
              mountPath: /external_data
            # SSH key for the FaxyMcFaxFace backend. The worker runs as root
            # (start-server.sh execs manage.py directly), so ~/.ssh is /root/.ssh.
            # Pre-flight: confirm the fax host trusts this key for the *root*
            # user, and whether the live secret is faxymcfaxface-ssh or
            # ssh-privatekey (README checklist).
            - name: faxymcfaxface-ssh
              readOnly: true
              mountPath: "/root/.ssh"
      volumes:
        - name: new-uploads-longhorn-backup4
          persistentVolumeClaim:
            claimName: new-uploads-longhorn-backup4
        - name: faxymcfaxface-ssh
          secret:
            secretName: faxymcfaxface-ssh
            # Private key: readable by the root worker process only.
            defaultMode: 0400
