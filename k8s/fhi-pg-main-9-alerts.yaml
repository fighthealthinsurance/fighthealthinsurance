# =============================================================================
# PrometheusRule for fhi-pg-main-9 -- backup + WAL-growth alerting.
#
# The entire -8 incident was SILENT: dead archiver for months, no PITR, pgdata
# bloated to ~229GB of unarchivable WAL, and NO infra alert fired. These rules
# are the direct antidote -- they make the two failure modes (backups broken /
# WAL growing unbounded) page instead of hide. Consumed via the PodMonitor that
# fhi-pg-main-9-cluster.yaml enables (monitoring.enablePodMonitor: true).
#
# ==> VERIFY-LIVE (metric names): confirm the exact CNPG metric names exported by
#     YOUR operator/plugin version before relying on these -- run, e.g.:
#       kubectl -n totallylegitco exec fhi-pg-main-9-1 -c postgres -- \
#         curl -s localhost:9187/metrics | grep -E 'wal|archiver|backup'
#     CNPG's default metric set has historically used the names below; adjust the
#     expr if your build differs. The THRESHOLDS (20GB WAL, 26h backup age) are
#     the intent -- keep them even if you must rename a metric.
#
# WAL threshold math: pg_wal size is not exported directly as bytes, so we alert
# on WAL FILE COUNT. Default WAL segment = 16MB, so 20GB / 16MB = 1280 segments.
# If your wal_segment_size differs, recompute FILES = 20GiB / segment_size.
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fhi-pg-main-9-backup-wal
  namespace: totallylegitco
  labels:
    app: fight-health-insurance
    cnpg.io/cluster: fhi-pg-main-9
    role: alert-rules
spec:
  groups:
    - name: fhi-pg-main-9.backup-and-wal
      rules:
        # ---- WAL GROWTH (the -8-1 disk-full failure mode) --------------------
        - alert: FhiPg9WalGrowingBeyond20GB
          # 1280 * 16MB = 20GiB. This is the hard "WAL won't grow" guard the
          # runbook's end-state verification requires. max_slot_wal_keep_size=16GB
          # should keep this from ever firing; if it does, a slot is stuck or the
          # archiver is wedged -- exactly the -8 pattern.
          expr: cnpg_pg_wal_files{namespace="totallylegitco", pod=~"fhi-pg-main-9-.*"} > 1280
          for: 10m
          labels:
            severity: critical
            cluster: fhi-pg-main-9
          annotations:
            summary: "fhi-pg-main-9 WAL exceeds 20GB ({{ $value }} segments on {{ $labels.pod }})"
            description: >-
              pg_wal on {{ $labels.pod }} holds {{ $value }} WAL segments
              (>20GiB). max_slot_wal_keep_size (16GB) should cap this. Check for a
              stuck/inactive replication slot and a wedged archiver
              (FhiPg9ArchiverFailing). This is the exact bloat that killed
              fhi-pg-main-8-1. Runbook: end-state WAL-bounded verification.

        - alert: FhiPg9WalWarning10GB
          expr: cnpg_pg_wal_files{namespace="totallylegitco", pod=~"fhi-pg-main-9-.*"} > 640
          for: 15m
          labels:
            severity: warning
            cluster: fhi-pg-main-9
          annotations:
            summary: "fhi-pg-main-9 WAL above 10GB on {{ $labels.pod }} (early warning)"
            description: >-
              Early warning at half the 20GB ceiling. Investigate slot retention
              and archiver health before it reaches critical.

        # ---- ARCHIVER (Fault B: dead archiving = no PITR) --------------------
        - alert: FhiPg9ArchiverFailing
          expr: increase(cnpg_pg_stat_archiver_failed_count{namespace="totallylegitco", pod=~"fhi-pg-main-9-.*"}[15m]) > 0
          for: 15m
          labels:
            severity: critical
            cluster: fhi-pg-main-9
          annotations:
            summary: "fhi-pg-main-9 WAL archiver is FAILING on {{ $labels.pod }}"
            description: >-
              pg_stat_archiver.failed_count is rising -- WAL is not reaching the
              object store, so PITR is silently broken and pg_wal will grow. This
              is Fault B from the -8 incident. Check the barman-cloud plugin
              endpoint, B2 creds, and the serving-cert CA.

        - alert: FhiPg9ArchiverStalled
          expr: cnpg_pg_stat_archiver_seconds_since_last_archival{namespace="totallylegitco", pod=~"fhi-pg-main-9-.*"} > 3600
          for: 15m
          labels:
            severity: critical
            cluster: fhi-pg-main-9
          annotations:
            summary: "fhi-pg-main-9 has not archived WAL in over 1h ({{ $labels.pod }})"
            description: >-
              No successful WAL archival in >1h. Even without rising failures, a
              stalled archiver means no new PITR coverage and growing pg_wal.

        # ---- BACKUP AGE (silent backup failure) -----------------------------
        - alert: FhiPg9BackupTooOld
          # daily schedule -> anything older than 26h is a missed/failed backup.
          expr: (time() - cnpg_collector_last_available_backup_timestamp{namespace="totallylegitco", pod=~"fhi-pg-main-9-.*"}) > 93600
          for: 30m
          labels:
            severity: critical
            cluster: fhi-pg-main-9
          annotations:
            summary: "fhi-pg-main-9 last successful backup is >26h old"
            description: >-
              No completed backup in over 26h (daily schedule). A restore would
              lose >1 day. The -8 cluster went from 2026-03-30 with NO alert --
              do not let -9 repeat that.

        # ---- CLUSTER DEGRADED (Fault A: the outage itself) ------------------
        - alert: FhiPg9ClusterDegraded
          expr: cnpg_pg_replication_streaming_replicas{namespace="totallylegitco", cluster="fhi-pg-main-9"} < 2
          for: 10m
          labels:
            severity: warning
            cluster: fhi-pg-main-9
          annotations:
            summary: "fhi-pg-main-9 has fewer than 2 streaming replicas"
            description: >-
              Ready replica count dropped. If this coincides with a plugin
              upgrade, check that the barman-cloud Service EndpointSlice is
              non-empty (the v0.9->v0.13 selector break that took -8 down).

        # ---- CONNECTION SATURATION (the 'too many clients' failure mode) ----
        # With max_connections=6000 the pressure reaper (50% threshold) is the
        # load-bearing control; these fire if usage climbs anyway.
        # VERIFY-LIVE: confirm the exact backends metric name your CNPG build
        # exports (cnpg_backends_total is the historical default set).
        # Per-pod (sum by): max_connections is a PER-INSTANCE limit, and only
        # the primary holds app connections -- a cluster-wide sum would both
        # false-positive on replica noise and hide which instance is full.
        - alert: FhiPg9ConnectionsHighWarning
          expr: sum by (pod) (cnpg_backends_total{namespace="totallylegitco", pod=~"fhi-pg-main-9-.*"}) > 2400
          for: 10m
          labels:
            severity: warning
            cluster: fhi-pg-main-9
          annotations:
            summary: "{{ $labels.pod }} backends above 40% of max_connections ({{ $value }})"
            description: >-
              Connection usage exceeds 2400 of 6000 for 10m. The pressure
              reaper should be evicting idle connections above 3000 -- check
              the pg-conn-pressure-reaper CronJob and run
              scripts/pg-conn-census.sh to fingerprint the holders.

        - alert: FhiPg9ConnectionsHighCritical
          expr: sum by (pod) (cnpg_backends_total{namespace="totallylegitco", pod=~"fhi-pg-main-9-.*"}) > 4200
          for: 5m
          labels:
            severity: critical
            cluster: fhi-pg-main-9
          annotations:
            summary: "{{ $labels.pod }} backends above 70% of max_connections ({{ $value }})"
            description: >-
              Approaching the hard cap; new app connections will start failing
              with 'too many clients'. The reaper is not keeping up or cannot
              connect -- intervene now.

        # ---- PRESSURE REAPER HEALTH (do not let the safety net fail silently)
        # VERIFY-LIVE: requires kube-state-metrics job metrics; adjust the
        # job_name pattern if the scrape labels differ.
        # sum() is load-bearing: every CronJob run is a UNIQUE job_name series
        # that (backoffLimit: 0) never exceeds 1, so a per-series increase()
        # could never cross 2 and the alert would never fire.
        - alert: FhiPg9PressureReaperFailing
          expr: sum(increase(kube_job_status_failed{namespace="totallylegitco", job_name=~"pg-conn-pressure-reaper-.*"}[30m])) > 2
          for: 5m
          labels:
            severity: warning
            cluster: fhi-pg-main-9
          annotations:
            summary: "pg-conn-pressure-reaper jobs are failing"
            description: >-
              The connection pressure reaper has failed repeatedly in the last
              30m (auth, DB unreachable, or SQL error -- pipefail makes psql
              failures fail the Job). Connection pressure is unmanaged while
              this persists.
