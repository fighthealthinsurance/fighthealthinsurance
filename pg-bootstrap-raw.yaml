apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: fhi-pg-main-7
  namespace: totallylegitco
spec:
  # Three Postgres instances spread across nodes as much as possible
  instances: 3

  #############################################################
  # Storage
  #############################################################
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 50Gi
      storageClassName: encrypted-local-path
      volumeMode: Filesystem

  #############################################################
  # Anti-affinity (spread pods across nodes when possible)
  #############################################################
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname

  #############################################################
  # PostgreSQL server configuration
  #############################################################
  postgresql:
    parameters:
      # Default is 100. Sized for the Django connection pools:
      # (web + back + staging uvicorn workers + Ray actor processes)
      # * pool max_size (10), plus replication/operator headroom.
      # NOTE: changing max_connections triggers a rolling restart.
      max_connections: "300"
      # Server-side safety net: kill sessions idle for 2 hours so leaked
      # client connections can't exhaust max_connections. Django's pool
      # recycles connections long before this (max_lifetime 30min).
      idle_session_timeout: "120min"
      # Same guard for sessions idle inside an open transaction, which
      # additionally hold locks and block vacuum.
      idle_in_transaction_session_timeout: "120min"

  #############################################################
  # Monitoring
  #############################################################
  monitoring:
    enablePodMonitor: false

  #############################################################
  # Superuser
  # (this Secret must contain {username,password})
  #############################################################
  superuserSecret:
    name: fhi-superuser-pg-secret

  #############################################################
  # Bootstrap with an app database + app user from your secret
  #############################################################
  bootstrap:
    initdb:
      # Name of the database your app uses
      database: app
      # Postgres ROLE to create
      # Pull username + password from your Ansible-created Secret
      owner: ziggystardust
      secret:
        name: fhi-internal-pg-secret

  #############################################################
  # Declarative Role Management
  # (keeps the app user's role + password in sync)
  #############################################################
  managed:
    roles:
      - name: ziggystardust
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        inherit: true
        replication: false
        passwordSecret:
          name: fhi-internal-pg-secret

  backup:
    barmanObjectStore:
      destinationPath: "s3://fhi-pg-backup-second/"
      endpointURL: "https://s3.us-west-004.backblazeb2.com"
      s3Credentials:
        accessKeyId:
          name: pg-backup
          key: PG_ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup
          key: PG_ACCESS_SECRET_KEY

      wal:
        compression: bzip2
        maxParallel: 4

      data:
        compression: bzip2
    retentionPolicy: "30d"
# The manual Backup and daily ScheduledBackup ("backup-example") that used to
# live here targeted fhi-pg-main-7, which is decommissioned. Removed so a
# re-apply can never resurrect backups of a dead cluster; -9's backups are
# defined in k8s/fhi-pg-main-9-objectstore.yaml + the runbook's schedule.
