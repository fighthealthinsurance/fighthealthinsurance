      Aetna Inc
      CVS Health Aetna
      CVS Aetna
    regex: aetna(?!\s*better)
    negative_regex: aetna\s*better\s*health
    website: https://www.aetna.com
    member_services_url: https://www.aetna.com/individuals-families/member-rights-resources.html
    appeals_info_url: https://www.aetna.com/health-care-professionals/disputes-appeals/disputes-appeals-overview.html
    appeal_address: |
      Aetna
      P.O. Box 14463
      Lexington, KY 40512
    appeal_fax_number: 859-425-3379
    notes: Major health insurance company, now part of CVS Health. Address shown is the National Appeals address for member commercial appeals.

