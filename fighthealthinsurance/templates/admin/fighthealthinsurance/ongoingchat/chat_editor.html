{% extends "admin/change_form.html" %}
{% load i18n %}

{% block extrahead %}
{{ block.super }}
<style>
  .chat-editor-container {
    margin: 20px 0;
    max-width: 900px;
  }
  .chat-editor-container h3 {
    margin: 0 0 12px 0;
    font-size: 1.1em;
    color: var(--body-quiet-color, #666);
  }
  .chat-panel {
    border: 1px solid var(--border-color, #ccc);
    border-radius: 8px;
    background: var(--darkened-bg, #f8f8f8);
    padding: 16px;
    margin-bottom: 24px;
  }
  .chat-messages {
    max-height: 600px;
    overflow-y: auto;
    padding: 8px 0;
  }
  .chat-message {
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    position: relative;
  }
  .chat-message.role-user {
    background: #e3f2fd;
    margin-left: 40px;
  }
  .chat-message.role-assistant {
    background: #f3e5f5;
    margin-right: 40px;
  }
  .chat-message.role-agent {
    background: #fff3e0;
    margin-right: 40px;
  }
  .chat-message-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 0.85em;
  }
  .chat-role-badge {
    font-weight: bold;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75em;
  }
  .role-user .chat-role-badge { background: #1565c0; color: white; }
  .role-assistant .chat-role-badge { background: #7b1fa2; color: white; }
  .role-agent .chat-role-badge { background: #e65100; color: white; }
  .chat-timestamp {
    color: var(--body-quiet-color, #999);
    font-size: 0.8em;
  }
  .chat-content {
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.5;
  }
  /* Editable panel */
  .edited-chat-panel .chat-message {
    position: relative;
  }
  .edited-chat-panel .chat-message-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
  }
  .edited-chat-panel .chat-message-actions button {
    background: none;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    padding: 2px 8px;
    font-size: 0.8em;
    color: var(--body-quiet-color, #666);
  }
  .edited-chat-panel .chat-message-actions button:hover {
    background: var(--darkened-bg, #eee);
  }
  .edited-chat-panel .chat-message-actions button.delete-btn:hover {
    background: #ffebee;
    color: #c62828;
    border-color: #ef9a9a;
  }
  .chat-content-editable {
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.5;
    min-height: 1.5em;
  }
  .chat-content-editable:focus {
    outline: 2px solid #1976d2;
    outline-offset: 2px;
    border-radius: 4px;
  }
  .chat-role-select {
    font-weight: bold;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.75em;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .chat-role-select:hover {
    border-color: #aaa;
  }
  .add-message-btn {
    display: block;
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: var(--button-bg, #417690);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9em;
  }
  .add-message-btn:hover {
    opacity: 0.9;
  }
  .copy-to-edited-btn {
    display: inline-block;
    padding: 6px 16px;
    margin-bottom: 12px;
    background: var(--button-bg, #417690);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9em;
  }
  .copy-to-edited-btn:hover {
    opacity: 0.9;
  }
  .tab-buttons {
    display: flex;
    gap: 0;
    margin-bottom: 0;
  }
  .tab-buttons button {
    padding: 8px 20px;
    border: 1px solid var(--border-color, #ccc);
    border-bottom: none;
    background: var(--darkened-bg, #f0f0f0);
    cursor: pointer;
    font-size: 0.9em;
    border-radius: 6px 6px 0 0;
  }
  .tab-buttons button.active {
    background: var(--body-bg, #fff);
    font-weight: bold;
    border-bottom: 1px solid var(--body-bg, #fff);
    margin-bottom: -1px;
    z-index: 1;
  }
  .tab-content {
    border: 1px solid var(--border-color, #ccc);
    border-radius: 0 8px 8px 8px;
    padding: 16px;
    background: var(--body-bg, #fff);
  }
  /* Hide the raw JSON fields */
  .field-chat_history,
  .field-edited_chat_history {
    display: none;
  }
</style>
{% endblock %}

{% block after_related_objects %}
{{ block.super }}

{% if original %}
<div class="chat-editor-container">
  <div class="tab-buttons">
    <button type="button" class="active" onclick="showTab('original')">Original Chat</button>
    <button type="button" onclick="showTab('edited')">Edited Chat</button>
  </div>
  <div class="tab-content">
    <!-- Original (read-only) tab -->
    <div id="tab-original">
      <h3>Original Chat History (read-only)</h3>
      <div class="chat-panel" id="original-chat-panel">
        <div class="chat-messages" id="original-messages"></div>
      </div>
    </div>

    <!-- Edited tab -->
    <div id="tab-edited" style="display:none;">
      <h3>Edited Chat History</h3>
      <button type="button" class="copy-to-edited-btn" onclick="copyOriginalToEdited()">
        Copy original to edited
      </button>
      <div class="chat-panel edited-chat-panel" id="edited-chat-panel">
        <div class="chat-messages" id="edited-messages"></div>
        <button type="button" class="add-message-btn" onclick="addMessage()">+ Add message</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // Parse the JSON data from the hidden textarea fields
  function getFieldValue(fieldName) {
    // Django admin renders JSONField as a textarea
    const textarea = document.getElementById('id_' + fieldName);
    if (!textarea) return [];
    try {
      const val = JSON.parse(textarea.value);
      return Array.isArray(val) ? val : [];
    } catch(e) {
      return [];
    }
  }

  function setFieldValue(fieldName, data) {
    const textarea = document.getElementById('id_' + fieldName);
    if (textarea) {
      textarea.value = JSON.stringify(data);
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  var ALLOWED_ROLES = ['user', 'assistant', 'agent'];
  function sanitizeRole(role) {
    role = (role || 'user').toLowerCase();
    return ALLOWED_ROLES.indexOf(role) !== -1 ? role : 'user';
  }

  function renderReadOnlyMessages(containerId, messages) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    if (!messages || messages.length === 0) {
      container.innerHTML = '<p style="color: #999; text-align: center;">No messages</p>';
      return;
    }
    messages.forEach(function(msg) {
      const role = sanitizeRole(msg.role);
      const div = document.createElement('div');
      div.className = 'chat-message role-' + role;
      div.innerHTML =
        '<div class="chat-message-header">' +
          '<span class="chat-role-badge">' + escapeHtml(role) + '</span>' +
          (msg.timestamp ? '<span class="chat-timestamp">' + escapeHtml(msg.timestamp) + '</span>' : '') +
        '</div>' +
        '<div class="chat-content">' + escapeHtml(msg.content) + '</div>';
      container.appendChild(div);
    });
  }

  function renderEditableMessages() {
    const container = document.getElementById('edited-messages');
    const messages = getFieldValue('edited_chat_history');
    container.innerHTML = '';
    if (!messages || messages.length === 0) {
      container.innerHTML = '<p style="color: #999; text-align: center;">No edited messages yet. Click "Copy original to edited" to start.</p>';
      return;
    }
    messages.forEach(function(msg, idx) {
      const role = sanitizeRole(msg.role);
      const div = document.createElement('div');
      div.className = 'chat-message role-' + role;
      div.setAttribute('data-idx', idx);
      div.innerHTML =
        '<div class="chat-message-header">' +
          '<select class="chat-role-select" onchange="window._chatEditor.changeRole(' + idx + ', this.value)">' +
            '<option value="user"' + (role === 'user' ? ' selected' : '') + '>USER</option>' +
            '<option value="assistant"' + (role === 'assistant' ? ' selected' : '') + '>ASSISTANT</option>' +
            '<option value="agent"' + (role === 'agent' ? ' selected' : '') + '>AGENT</option>' +
          '</select>' +
          (msg.timestamp ? '<span class="chat-timestamp">' + escapeHtml(msg.timestamp) + '</span>' : '') +
        '</div>' +
        '<div class="chat-message-actions">' +
          (idx > 0 ? '<button type="button" onclick="window._chatEditor.moveUp(' + idx + ')" title="Move up">&uarr;</button>' : '') +
          (idx < messages.length - 1 ? '<button type="button" onclick="window._chatEditor.moveDown(' + idx + ')" title="Move down">&darr;</button>' : '') +
          '<button type="button" class="delete-btn" onclick="window._chatEditor.deleteMsg(' + idx + ')" title="Delete">&times;</button>' +
        '</div>' +
        '<div class="chat-content-editable" contenteditable="true" ' +
          'onblur="window._chatEditor.updateContent(' + idx + ', this.textContent)">' +
          escapeHtml(msg.content) +
        '</div>';
      container.appendChild(div);
    });
  }

  // Public API
  window._chatEditor = {
    changeRole: function(idx, newRole) {
      const messages = getFieldValue('edited_chat_history');
      if (messages[idx]) {
        messages[idx].role = newRole;
        setFieldValue('edited_chat_history', messages);
        renderEditableMessages();
      }
    },
    updateContent: function(idx, newContent) {
      const messages = getFieldValue('edited_chat_history');
      if (messages[idx]) {
        messages[idx].content = newContent;
        setFieldValue('edited_chat_history', messages);
      }
    },
    deleteMsg: function(idx) {
      const messages = getFieldValue('edited_chat_history');
      messages.splice(idx, 1);
      setFieldValue('edited_chat_history', messages);
      renderEditableMessages();
    },
    moveUp: function(idx) {
      const messages = getFieldValue('edited_chat_history');
      if (idx > 0) {
        const tmp = messages[idx];
        messages[idx] = messages[idx - 1];
        messages[idx - 1] = tmp;
        setFieldValue('edited_chat_history', messages);
        renderEditableMessages();
      }
    },
    moveDown: function(idx) {
      const messages = getFieldValue('edited_chat_history');
      if (idx < messages.length - 1) {
        const tmp = messages[idx];
        messages[idx] = messages[idx + 1];
        messages[idx + 1] = tmp;
        setFieldValue('edited_chat_history', messages);
        renderEditableMessages();
      }
    }
  };

  window.addMessage = function() {
    const messages = getFieldValue('edited_chat_history');
    messages.push({
      role: 'user',
      content: '',
      timestamp: new Date().toISOString()
    });
    setFieldValue('edited_chat_history', messages);
    renderEditableMessages();
    // Focus the new message
    const editables = document.querySelectorAll('#edited-messages .chat-content-editable');
    if (editables.length > 0) {
      editables[editables.length - 1].focus();
    }
  };

  window.copyOriginalToEdited = function() {
    const existing = getFieldValue('edited_chat_history');
    if (existing && existing.length > 0) {
      if (!confirm('This will overwrite the current edited chat history. Continue?')) {
        return;
      }
    }
    const original = getFieldValue('chat_history');
    // Deep copy
    setFieldValue('edited_chat_history', JSON.parse(JSON.stringify(original)));
    renderEditableMessages();
  };

  window.showTab = function(tabName) {
    document.getElementById('tab-original').style.display = tabName === 'original' ? '' : 'none';
    document.getElementById('tab-edited').style.display = tabName === 'edited' ? '' : 'none';
    const buttons = document.querySelectorAll('.tab-buttons button');
    buttons.forEach(function(btn) {
      btn.classList.toggle('active', btn.textContent.toLowerCase().indexOf(tabName) !== -1);
    });
  };

  // Initial render
  const originalMessages = getFieldValue('chat_history');
  renderReadOnlyMessages('original-messages', originalMessages);
  renderEditableMessages();
})();
</script>
{% endif %}
{% endblock %}
