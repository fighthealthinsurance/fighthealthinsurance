{% extends 'base.html' %}
{% block title %}
Confirm Data Deletion
{% endblock title %}
{% block content %}

<!-- HOME -->
<section id="delete-data" data-stellar-background-ratio="0.5">
    <div class="row mt-5 mb-5">
        <div class="caption d-flex flex-column align-items-center justify-content-center">
            <div class="col-md-offset-1 col-md-10 text-align-center d-flex flex-column align-items-center justify-content-center" style="margin-top: 10vh;">
                <h2 class="delete-header">Confirm Data Deletion</h2>
                <p>You are about to permanently delete all data associated with <strong>{{ email }}</strong>.</p>
                <p>This action cannot be undone.</p>
                <form action="{% url 'confirm_delete_data' %}" method="post" class="mt-3">
                    {% csrf_token %}
                    <input type="hidden" name="token" value="{{ token }}">
                    <input type="hidden" name="email" value="{{ email }}">
                    <button type="submit" class="btn btn-delete">Confirm Deletion</button>
                </form>
            </div>
        </div>
    </div>
</section>

{% endblock content %}
